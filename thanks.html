<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Glass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .thanks-bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #3b6fd4 0%, transparent 70%);
      opacity: 0.1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }
    .thanks-card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
    }
    .thanks-card img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      margin-bottom: 28px;
    }
    .thanks-check {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .thanks-card h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 14px;
    }
    .thanks-card p {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .thanks-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 10px;
      transition: color 0.15s, border-color 0.15s;
    }
    .thanks-back:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }
  </style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-bg-glow"></div>
    <div class="thanks-card">
      <img src="assets/logo.png" alt="Glass" />
      <div class="thanks-check">✓</div>
      <h1>You're on the list.</h1>
      <p>We'll reach out when Glass is ready.<br />Thanks for your interest.</p>
      <a href="/" class="thanks-back">← Back to Glass</a>
    </div>
  </div>
</body>
</html>
